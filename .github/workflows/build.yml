name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller tank_battle.spec --clean

    - name: Show dist contents
      run: dir dist

    - name: Create release assets
      run: |
        cd dist
        Compress-Archive -Path TankBattle.exe, TankBattle.exe.manifest -DestinationPath TankBattle_Windows.zip -ErrorAction SilentlyContinue
        if (-not (Test-Path TankBattle_Windows.zip)) {
          Compress-Archive -Path TankBattle.exe -DestinationPath TankBattle_Windows.zip
        }
      shell: pwsh

    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/TankBattle_Windows.zip
      if: startsWith(github.ref, 'refs/tags/')

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils libsndfile1
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller tank_battle.spec --clean

    - name: Show dist contents
      run: ls -la dist/

    - name: Create release assets
      run: |
        cd dist
        zip -r TankBattle_Linux.zip TankBattle

    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/TankBattle_Linux.zip
      if: startsWith(github.ref, 'refs/tags/')

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller tank_battle.spec --clean

    - name: Show dist contents
      run: ls -la dist/

    - name: Create release assets
      run: |
        cd dist
        zip -r TankBattle_macOS.zip TankBattle.app 2>/dev/null || zip -r TankBattle_macOS.zip TankBattle

    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/TankBattle_macOS.zip
      if: startsWith(github.ref, 'refs/tags/')

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]

    steps:
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      if: startsWith(github.ref, 'refs/tags/')
